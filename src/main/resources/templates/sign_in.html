<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>로그인</h1>
    <form action="/login" method="post">

        <div>
            <label for="loginId">
                아이디:
            </label>
            <input id="loginId" type="text" name="loginId">
        </div>
        <div>
            <label for="loginPwd">
                비밀번호:
            </label>
            <input id="loginPwd" type="password" name="loginPwd">
        </div>

        <div>
            <button>로그인</button>
        </div>

    </form>
</body>
</html>
